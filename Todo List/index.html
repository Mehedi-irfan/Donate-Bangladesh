<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- tailwind css  -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <!-- remix icon  -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.min.css"
    />
    <title>Todo List</title>
  </head>
  <body>
    <div class="bg-blue-950 flex justify-center items-center w-full h-screen">
      <div class="bg-white text-blue-950 px-8 py-12 space-y-5 rounded-2xl w-96">
        <div class="relative flex items-center gap-2">
          <h1 class="text-2xl font-bold">To-do List</h1>
          <img class="w-6" src="./images/icon.png" alt="" />
        </div>
        <div
          class="flex items-center justify-between w-full bg-blue-950 rounded-full"
        >
          <input
            class="outline-none focus:none placeholder:text-white placeholder:text-sm text-white rounded-3xl px-5 py-2"
            id="inputField"
            type="text"
            placeholder="Enter your Task"
          />
          <button
            id="submit-btn"
            class="text-white bg-orange-600 px-8 py-2 rounded-full"
          >
            Add
          </button>
        </div>
        <div id="list-container">
          <!-- <ul id=""></ul> -->
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
